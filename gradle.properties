# ============================================================================
#  UnlockEnchantment 全局 Gradle 配置 (gradle.properties)
# ============================================================================
#  本文件存放整个 Gradle 构建共用的属性，作用于项目级别。
#  既包含项目元信息（group/version），也包含 Gradle 性能开关。
# ============================================================================

# Maven 组 ID：标识项目的组织/命名空间，用于发布制品时的坐标
group=org.luminolcraft

# 项目版本号：会被 build.gradle.kts 的 processResources 注入到 plugin.yml
version=0.1

# 启用 Gradle 配置缓存：构建配置阶段的结果会被缓存复用，显著加速二次构建
org.gradle.configuration-cache=true

# 启用并行构建：多个独立子项目/任务可同时执行，缩短构建总耗时
org.gradle.parallel=true

# 启用构建缓存：任务输出按输入哈希缓存，跨构建复用，避免重复劳动
org.gradle.caching=true
